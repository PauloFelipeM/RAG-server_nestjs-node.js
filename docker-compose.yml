services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_nestjs_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_nestjs
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
